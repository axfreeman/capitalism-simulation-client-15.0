{{ template "header.html" .}}
<div class="w3-container w3-center" style="width:75%; margin:auto; padding-top: 100px;">
    <div class="w3-medium">
        <header class="w3-container w3-blue">
            <h3 class="w3-center">Choose a player</h3>
        </header>

        <table id="simulation-templates" class="display compact w3-small" style="width:20%; margin:auto">
            </thead>
            <tbody>
                {{ range .users}}
                <tr><td>
                    {{ if .IsLocked}}
                    <a class="w3-disabled w3-block w3-button w3-blue">{{ .UserName}}</a>
                    {{ else }}
                    <a class="w3-button w3-block w3-blue" href="/admin/play-as/{{ .UserName }}">{{ .UserName}}</a>
                    {{ end }}
                </td></tr>
                {{ end }}
            </tbody>
        </table>
    </div>
</div>
{{ template "footer.html" .}}
